<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestiOrder — Iniciar sesión</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg:#0f0f11;--surface:#17171a;--surface2:#1e1e22;
  --border:#2e2e35;--border2:#3a3a44;
  --accent:#6c5ce7;--accent2:#a29bfe;--accent-dim:rgba(108,92,231,0.15);
  --green:#00b894;--red:#e17055;
  --text:#e8e8f0;--text2:#9090a8;--text3:#55556a;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px 36px;width:380px;text-align:center}
.logo{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.logo span{color:var(--accent2)}
.tagline{font-size:13px;color:var(--text3);margin-bottom:32px;font-family:var(--mono)}
.divider{height:1px;background:var(--border);margin:24px 0}
.company{font-size:12px;color:var(--text3);margin-top:20px}
.company strong{color:var(--text2)}
.error-msg{background:rgba(225,112,85,0.12);border:1px solid var(--red);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--red);margin-top:16px;display:none}
.checking{font-size:13px;color:var(--text3);margin-top:16px;display:none}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">Gesti<span>Order</span></div>
  <div class="tagline">Sistema de gestión de órdenes</div>

  <div id="g_id_onload"
    data-client_id="743687457454-94b4cmro27kru6m7r0mea54t47bji0n0.apps.googleusercontent.com"
    data-callback="handleCredentialResponse"
    data-auto_prompt="false">
  </div>
  <div class="g_id_signin"
    data-type="standard"
    data-size="large"
    data-theme="outline"
    data-text="signin_with"
    data-shape="rectangular"
    data-logo_alignment="left"
    data-width="308">
  </div>

  <div class="error-msg" id="errorMsg">
    ⚠ Tu correo no tiene acceso al sistema. Contacta al administrador.
  </div>
  <div class="checking" id="checkingMsg">
    Verificando acceso...
  </div>

  <div class="divider"></div>
  <div class="company">Casconi Plast / <strong>V&S Polibags</strong></div>
</div>

<script>
// ── CORREOS AUTORIZADOS ───────────────────────────────────
const ADMINS = [
  'valentinoborjacas@gmail.com',  // Reemplaza con tu correo real
  // Agrega más admins aquí:
  // 'admin2@gmail.com',
];

const OPERARIOS = [
  // Agrega correos de operarios aquí:
  // 'operario1@gmail.com',
  // 'operario2@gmail.com',
];

function handleCredentialResponse(response) {
  document.getElementById('checkingMsg').style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';

  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  const email = payload.email.toLowerCase();
  const name  = payload.name;

  const isAdmin    = ADMINS.map(e => e.toLowerCase()).includes(email);
  const isOperario = OPERARIOS.map(e => e.toLowerCase()).includes(email);

  if (isAdmin) {
    sessionStorage.setItem('go_user', JSON.stringify({ email, name, rol: 'admin', token: response.credential }));
    window.location.href = 'index.html';
  } else if (isOperario) {
    sessionStorage.setItem('go_user', JSON.stringify({ email, name, rol: 'operario', token: response.credential }));
    window.location.href = 'operario.html';
  } else {
    document.getElementById('checkingMsg').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'block';
    sessionStorage.removeItem('go_user');
  }
}

// Si ya hay sesión activa, redirigir según rol
const session = sessionStorage.getItem('go_user');
if (session) {
  const user = JSON.parse(session);
  window.location.href = user.rol === 'operario' ? 'operario.html' : 'index.html';
}
</script>
</body>
</html>
