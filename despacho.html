<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestiOrder — Seguimiento</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f11;
  --surface: #17171a;
  --surface2: #1e1e22;
  --surface3: #26262c;
  --border: #2e2e35;
  --border2: #3a3a44;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --accent-dim: rgba(108,92,231,0.15);
  --green: #00b894;
  --green-dim: rgba(0,184,148,0.12);
  --yellow: #fdcb6e;
  --yellow-dim: rgba(253,203,110,0.12);
  --red: #e17055;
  --red-dim: rgba(225,112,85,0.12);
  --blue: #74b9ff;
  --blue-dim: rgba(116,185,255,0.12);
  --text: #e8e8f0;
  --text2: #9090a8;
  --text3: #55556a;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 10px;
  --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }


.app { display: flex; min-height: 100vh; }
.sidebar { width: 200px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px 0; flex-shrink: 0; display: flex; flex-direction: column; }
.logo { padding: 0 16px 20px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.logo-name { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -.3px; }
.logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 9px 16px; font-size: 13px; color: var(--text2); cursor: pointer; transition: all .15s; border-left: 2px solid transparent; text-decoration: none; }
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--accent2); border-left-color: var(--accent); background: var(--accent-dim); }
.nav-icon { width: 15px; height: 15px; opacity: .7; }
.nav-section { font-size: 10px; color: var(--text3); padding: 12px 16px 4px; text-transform: uppercase; letter-spacing: .8px; font-family: var(--mono); }
.main { flex: 1; overflow-y: auto; }



.logo-name { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -.3px; }
.logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 9px 16px; font-size: 13px; color: var(--text2); cursor: pointer; transition: all .15s; border-left: 2px solid transparent; }
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--accent2); border-left-color: var(--accent); background: var(--accent-dim); }
.nav-icon { width: 15px; height: 15px; opacity: .7; }
.nav-section { font-size: 10px; color: var(--text3); padding: 12px 16px 4px; text-transform: uppercase; letter-spacing: .8px; font-family: var(--mono); }

.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.topbar { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); position: sticky; top: 0; z-index: 10; flex-shrink: 0; }
.topbar-title { font-size: 15px; font-weight: 500; }
.topbar-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }

.layout { display: flex; flex: 1; overflow: hidden; }
.list-panel { width: 340px; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; }
.detail-panel { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* FILTERS */
.filters { padding: 12px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 10px; color: var(--text); font-family: var(--font); font-size: 13px; }
.search-input:focus { outline: none; border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); }
.pills { display: flex; gap: 6px; flex-wrap: wrap; }
.pill { padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; font-size: 11px; cursor: pointer; color: var(--text2); font-family: var(--mono); transition: all .15s; }
.pill:hover { border-color: var(--border2); color: var(--text); }
.pill.on { background: var(--accent-dim); color: var(--accent2); border-color: var(--accent); }

/* ORDER LIST */
.ord-item { padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; }
.ord-item:hover { background: var(--surface2); }
.ord-item.active { background: var(--accent-dim); border-left: 2px solid var(--accent); }
.ord-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.ord-num { font-family: var(--mono); font-size: 12px; color: var(--accent2); }
.ord-client { font-size: 13px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ord-dest { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.ord-meta { display: flex; justify-content: space-between; align-items: center; }
.ord-date { font-size: 11px; color: var(--text3); }
.prog-wrap { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
.prog-bar { background: var(--surface3); border-radius: 4px; height: 4px; flex: 1; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 4px; transition: width .3s; }
.prog-txt { font-size: 10px; color: var(--text3); white-space: nowrap; font-family: var(--mono); }

/* BADGE */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 500; font-family: var(--mono); white-space: nowrap; }
.b-pend { background: var(--yellow-dim); color: var(--yellow); }
.b-part { background: var(--blue-dim); color: var(--blue); }
.b-done { background: var(--green-dim); color: var(--green); }
.b-tick { background: var(--red-dim); color: var(--red); }
.b-cancel { background: var(--surface3); color: var(--text3); }

/* DETAIL */
.detail-header { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; }
.dh-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.dh-ord { font-size: 20px; font-weight: 600; font-family: var(--mono); color: var(--accent2); }
.dh-client { font-size: 14px; margin-top: 3px; }
.dh-dest { font-size: 12px; color: var(--text3); margin-top: 2px; }
.dh-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.dh-stat { text-align: center; }
.dh-stat .val { font-size: 20px; font-weight: 600; font-family: var(--mono); }
.dh-stat .lab { font-size: 10px; color: var(--text3); margin-top: 3px; text-transform: uppercase; letter-spacing: .4px; }
.dh-info { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 14px; }
.info-row { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 8px; background: var(--surface2); border-radius: var(--radius-sm); }
.info-label { color: var(--text3); }
.info-val { color: var(--text); font-weight: 500; }

/* TIMELINE */
.tl-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 16px; }
.card-title { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 16px; font-family: var(--mono); }
.tl { display: flex; flex-direction: column; }
.tl-row { display: flex; gap: 14px; padding-bottom: 20px; position: relative; }
.tl-row:last-child { padding-bottom: 0; }
.tl-left { display: flex; flex-direction: column; align-items: center; width: 14px; flex-shrink: 0; }
.tl-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; z-index: 1; margin-top: 2px; }
.dot-done { background: var(--accent); }
.dot-active { background: var(--yellow); box-shadow: 0 0 0 3px rgba(253,203,110,0.2); }
.dot-pend { background: var(--surface3); border: 1.5px solid var(--border2); }
.dot-alert { background: var(--red); box-shadow: 0 0 0 3px rgba(225,112,85,0.2); }
.tl-line { flex: 1; width: 1.5px; background: var(--border); margin-top: 4px; }
.tl-body { flex: 1; }
.tl-stage { font-size: 13px; font-weight: 500; }
.tl-desc { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.5; }
.tl-time { font-size: 11px; color: var(--text3); margin-top: 3px; font-family: var(--mono); }
.tl-chip { display: inline-flex; padding: 2px 7px; border-radius: 4px; font-size: 10px; margin-top: 5px; font-family: var(--mono); }
.chip-ok { background: var(--green-dim); color: var(--green); }
.chip-warn { background: var(--yellow-dim); color: var(--yellow); }
.chip-err { background: var(--red-dim); color: var(--red); }
.chip-info { background: var(--blue-dim); color: var(--blue); }

/* ITEMS TABLE */
.items-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 16px; }
.items-table { width: 100%; border-collapse: collapse; }
.items-table th { padding: 7px 10px; text-align: left; font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid var(--border); font-family: var(--mono); }
.items-table td { padding: 9px 10px; font-size: 12px; border-bottom: 1px solid var(--border); }
.items-table tr:last-child td { border-bottom: none; }
.items-table tr:hover td { background: var(--surface2); }
.code-cell { font-family: var(--mono); font-size: 11px; color: var(--accent2); }
.qty-cell { font-family: var(--mono); text-align: right; }
.prog-item { display: flex; align-items: center; gap: 6px; }
.prog-item .bar { background: var(--surface3); border-radius: 3px; height: 5px; width: 60px; overflow: hidden; }
.prog-item .fill { height: 100%; border-radius: 3px; }
.prog-item .pct { font-size: 10px; color: var(--text3); font-family: var(--mono); white-space: nowrap; }

/* EMPTY / LOADING */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 10px; color: var(--text3); padding: 40px; text-align: center; }
.empty svg { opacity: .3; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent2); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 20px; right: 20px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; z-index: 1000; transform: translateY(80px); opacity: 0; transition: all .3s; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--red); }
.toast.loading { border-left: 3px solid var(--accent); }

.count-badge { background: var(--surface3); border-radius: 20px; padding: 2px 8px; font-size: 11px; color: var(--text2); font-family: var(--mono); }
</style>
</head>
<body>
<script src="auth.js"></script>
<div class="app">
  <div class="sidebar">
    <div class="logo"><div class="logo-name">GestiOrder</div><div class="logo-sub">v1.0</div></div>
    <div style="padding:10px 16px;border-bottom:1px solid var(--border);margin-bottom:8px">
      <div style="font-size:11px;color:var(--text3);margin-bottom:3px">Sesión activa</div>
      <div id="sidebarUser" style="font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
      <div id="sidebarRol" style="font-size:10px;margin-top:2px;font-family:var(--mono)"></div>
      <button onclick="cerrarSesion()" style="margin-top:6px;background:transparent;border:none;color:var(--text3);font-size:11px;cursor:pointer;padding:0;font-family:var(--font)">Cerrar sesión →</button>
    </div>

    <div class="nav-section">Operaciones</div>
    <a class="nav-item" href="index.html"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9" x2="9" y2="9"/></svg>Nueva Orden</a>
    <a class="nav-item active" href="seguimiento.html"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><polyline points="8,5 8,8 10,10"/></svg>Seguimiento</a>
    <a class="nav-item" href="tickets.html"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12v8H2z"/><path d="M10 4v8"/></svg>Tickets Fab.</a>
    <a class="nav-item" href="despacho.html"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="6" width="10" height="8" rx="1"/><path d="M11 9h2l2 3v2h-4"/><circle cx="4" cy="14" r="1.5"/><circle cx="13" cy="14" r="1.5"/></svg>Despacho</a>
    <div class="nav-section">Consultas</div>
    <a class="nav-item" href="stock.html"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>Stock</a>
  </div>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">Seguimiento de órdenes</div>
        <div class="topbar-sub">Consulta el estado e ítems de cada orden</div>
      </div>
      <span class="count-badge" id="countBadge">— órdenes</span>
    </div>

    <div class="layout">
      <!-- LISTA -->
      <div class="list-panel">
        <div class="filters">
          <input class="search-input" type="text" placeholder="Buscar orden o cliente..." id="searchInput" oninput="filtrar()">
          <div class="pills" id="pillGroup">
            <span class="pill on" data-st="all" onclick="setPill(this)">Todas</span>
            <span class="pill" data-st="PENDIENTE" onclick="setPill(this)">Pendiente</span>
            <span class="pill" data-st="PARCIAL ENVIADO" onclick="setPill(this)">Parcial</span>
            <span class="pill" data-st="ENTREGADO" onclick="setPill(this)">Entregado</span>
          </div>
        </div>
        <div id="orderList">
          <div class="empty"><div class="spinner"></div><span>Cargando órdenes...</span></div>
        </div>
      </div>

      <!-- DETALLE -->
      <div class="detail-panel" id="detailPanel">
        <div class="empty" id="noSel">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="24" cy="24" r="20"/><polyline points="24,14 24,24 30,30"/></svg>
          <div style="font-size:13px">Selecciona una orden para ver su detalle</div>
        </div>
        <div id="detailContent" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEET_ID = '1lc-HSFfaUKF0c7qVQVoqshhzcnlEsjzX9HTPo4EFSNs';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9NRV2FcnD2i3y1xrPx84eiCie23HZjVqoRN01fydfkjM_pgZmxRAqqN73m7aNkVCphw/exec';

let ordenes = [];
let itemsPorOrden = {};
let activeSt = 'all';
let activeId = null;

// ─── INIT ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await cargarDatos();
});

async function cargarDatos() {
  showToast('Cargando órdenes...', 'loading');
  try {
    const urlOrdenes = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=ORDENES&range=A3:J500`;
    const urlItems   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=ORDEN_ITEMS&range=A3:J2000`;

    const [rOrd, rItems] = await Promise.all([
      fetch(urlOrdenes).then(r => r.text()),
      fetch(urlItems).then(r => r.text())
    ]);

    const rawOrd   = parseGviz(rOrd).filter(r => r[0]);
    const rawItems = parseGviz(rItems).filter(r => r[0]);

    ordenes = rawOrd.map(r => ({
      numero:      r[0]?.trim() || '',
      fechaOrden:  r[1]?.trim() || '',
      cliente:     r[2]?.trim() || '',
      destinatario:r[3]?.trim() || '',
      empresa:     r[4]?.trim() || '',
      fechaEntrega:r[5]?.trim() || '',
      estado:      r[6]?.trim() || 'PENDIENTE',
      origen:      r[7]?.trim() || '',
      entrega1:    r[8]?.trim() || '',
      notas:       r[9]?.trim() || '',
    }));

    // Agrupar ítems por orden
    rawItems.forEach(r => {
      const num = r[0]?.trim();
      if (!num) return;
      if (!itemsPorOrden[num]) itemsPorOrden[num] = [];
      itemsPorOrden[num].push({
        orden:       num,
        codigo:      r[1]?.trim() || '',
        descripcion: r[2]?.trim() || '',
        litraje:     r[3]?.trim() || '',
        medida:      r[4]?.trim() || '',
        fuelle:      r[5]?.trim() || '',
        cantidad:    parseFloat(r[6]) || 0,
        env1:        parseFloat(r[7]) || 0,
        env2:        parseFloat(r[8]) || 0,
        estado:      r[9]?.trim() || 'PENDIENTE',
      });
    });

    filtrar();
    showToast(`${ordenes.length} órdenes cargadas`, 'success');
  } catch(e) {
    showToast('Error cargando datos', 'error');
    document.getElementById('orderList').innerHTML = `<div class="empty"><span style="color:var(--red)">Error al conectar con el Sheet</span><span style="font-size:11px">Verifica que el Sheet sea público</span></div>`;
  }
}

function parseGviz(raw) {
  try {
    const json = JSON.parse(raw.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    return (json.table.rows || []).map(row =>
      (json.table.cols || []).map((_, i) => row.c[i] ? (row.c[i].v !== null ? String(row.c[i].v) : '') : '')
    );
  } catch(e) { return []; }
}

// ─── FILTROS ──────────────────────────────────────────────
function filtrar() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = ordenes.filter(o => {
    if (activeSt !== 'all' && o.estado !== activeSt) return false;
    if (q && !o.numero.toLowerCase().includes(q) && !o.cliente.toLowerCase().includes(q)) return false;
    return true;
  });
  renderList(filtered);
  document.getElementById('countBadge').textContent = `${filtered.length} órdenes`;
}

function setPill(el) {
  document.querySelectorAll('#pillGroup .pill').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  activeSt = el.dataset.st;
  filtrar();
}

// ─── RENDER LISTA ─────────────────────────────────────────
function renderList(list) {
  const el = document.getElementById('orderList');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><span>Sin resultados</span></div>';
    return;
  }
  el.innerHTML = '';
  list.forEach(o => {
    const items = itemsPorOrden[o.numero] || [];
    const totalCant = items.reduce((s, i) => s + i.cantidad, 0);
    const totalEnv = items.reduce((s, i) => s + i.env1 + i.env2, 0);
    const pct = totalCant > 0 ? Math.round(totalEnv / totalCant * 100) : 0;
    const progColor = o.estado === 'ENTREGADO' ? 'var(--green)' : o.estado === 'PARCIAL ENVIADO' ? 'var(--blue)' : 'var(--text3)';

    const div = document.createElement('div');
    div.className = 'ord-item' + (activeId === o.numero ? ' active' : '');
    div.innerHTML = `
      <div class="ord-top">
        <span class="ord-num">${o.numero}</span>
        <span class="badge ${stClass(o.estado)}">${stLabel(o.estado)}</span>
      </div>
      <div class="ord-client">${o.cliente}</div>
      ${o.destinatario ? `<div class="ord-dest">→ ${o.destinatario}</div>` : ''}
      <div class="ord-meta">
        <span class="ord-date">Entrega: ${o.fechaEntrega || '—'}</span>
        <span class="ord-date">${items.length} ítems</span>
      </div>
      <div class="prog-wrap">
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${progColor}"></div></div>
        <span class="prog-txt">${totalEnv.toLocaleString()}/${totalCant.toLocaleString()}</span>
      </div>`;
    div.onclick = () => seleccionarOrden(o.numero);
    el.appendChild(div);
  });
}

// ─── DETALLE ──────────────────────────────────────────────
function seleccionarOrden(num) {
  activeId = num;
  // Re-render list para marcar activo
  filtrar();

  const o = ordenes.find(x => x.numero === num);
  if (!o) return;
  const items = itemsPorOrden[num] || [];

  document.getElementById('noSel').style.display = 'none';
  const dc = document.getElementById('detailContent');
  dc.style.display = 'block';

  const totalItems = items.length;
  const totalCant  = items.reduce((s, i) => s + i.cantidad, 0);
  const totalEnv1  = items.reduce((s, i) => s + i.env1, 0);
  const totalEnv2  = items.reduce((s, i) => s + i.env2, 0);
  const totalEnv   = totalEnv1 + totalEnv2;
  const totalPend  = totalCant - totalEnv;
  const pct        = totalCant > 0 ? Math.round(totalEnv / totalCant * 100) : 0;
  const sinStock   = items.filter(i => i.estado === 'SIN STOCK').length;

  // Línea de tiempo dinámica
  const stages = buildTimeline(o, items, totalEnv1, totalEnv2, sinStock);

  // Tabla ítems
  const itemsRows = items.map(item => {
    const pctItem = item.cantidad > 0 ? Math.round((item.env1 + item.env2) / item.cantidad * 100) : 0;

      <td class="qty-cell" style="color:${pend > 0 ? 'var(--yellow)' : 'var(--text3)'}">${pend.toLocaleString()}</td>
      <td>
        <div class="prog-item">
          <div class="bar"><div class="fill" style="width:${pctItem}%;background:${fillColor}"></div></div>

        </div>
      </td>
      <td><span class="badge ${itemStClass(item.estado)}">${item.estado}</span></td>
    </tr>`;

  dc.innerHTML = `

      <div class="dh-top">
        <div>
          <div class="dh-ord">${o.numero}</div>
          <div class="dh-client">${o.cliente}</div>

        </div>

          <button onclick="imprimirSeguimiento('${o.numero}')" style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:12px;font-family:var(--font);cursor:pointer">

            PDF
          </button>
          ${o.estado !== 'CANCELADO' ? `<button onclick="pedirAnularOrden('${o.numero}')" style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--red);background:var(--red-dim);color:var(--red);font-size:12px;font-family:var(--font);cursor:pointer">

          </button>` : ''}

      </div>
      <div class="dh-stats">

        <div class="dh-stat"><div class="val" style="color:${totalPend > 0 ? 'var(--yellow)' : 'var(--green)'}">${totalPend.toLocaleString()}</div><div class="lab">Pendiente</div></div>
        <div class="dh-stat"><div class="val">${pct}%</div><div class="lab">Avance</div></div>
      </div>
      <div style="margin-top:12px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px"><span>Progreso total</span><span style="font-family:var(--mono)">${pct}%</span></div>
        <div style="background:var(--surface3);border-radius:4px;height:7px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${o.estado==='ENTREGADO'?'var(--green)':'var(--accent)'};border-radius:4px;transition:width .4s"></div>
        </div>
      </div>
      <div class="dh-info">
        <div class="info-row"><span class="info-label">Empresa</span><span class="info-val">${o.empresa}</span></div>
        <div class="info-row"><span class="info-label">Origen</span><span class="info-val">${o.origen || '—'}</span></div>
        <div class="info-row"><span class="info-label">Fecha orden</span><span class="info-val">${o.fechaOrden || '—'}</span></div>
        <div class="info-row"><span class="info-label">Fecha entrega</span><span class="info-val">${o.fechaEntrega || '—'}</span></div>
        ${o.notas ? `<div class="info-row" style="grid-column:1/-1"><span class="info-label">Notas</span><span class="info-val">${o.notas}</span></div>` : ''}
      </div>
    </div>

    <div class="tl-card">
      <div class="card-title">Línea de tiempo</div>
      <div class="tl">${stages}</div>
    </div>

    <div class="items-card">
      <div class="card-title">Ítems de la orden — ${totalItems} total</div>
      <table class="items-table">
        <thead>
          <tr>
            <th>Código</th>
            <th>Descripción</th>
            <th style="text-align:right">Pedido</th>
            <th style="text-align:right">1ra Entrega</th>
            <th style="text-align:right">2da Entrega</th>
            <th style="text-align:right">Pendiente</th>
            <th>Avance</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>${itemsRows}</tbody>
      </table>
    </div>
  `;
}

function buildTimeline(o, items, env1, env2, sinStock) {
  const stages = [];

  // 1. Orden recibida
  stages.push({
    dot: 'dot-done',
    title: 'Orden recibida',
    desc: `${items.length} ítems registrados · Origen: ${o.origen || '—'}`,
    time: o.fechaOrden,
    chip: 'ok', chipTxt: 'Registrado'
  });

  // 2. Sin stock
  if (sinStock > 0) {
    stages.push({
      dot: 'dot-alert',
      title: 'Ítems sin stock detectados',
      desc: `${sinStock} ítem${sinStock > 1 ? 's' : ''} requieren fabricación`,
      time: o.fechaOrden,
      chip: 'err', chipTxt: 'Sin stock'
    });
  }

  // 3. Primera entrega
  const has1 = env1 > 0;
  stages.push({
    dot: has1 ? 'dot-done' : 'dot-pend',
    title: '1ra entrega / despacho',
    desc: has1 ? `${env1.toLocaleString()} unidades despachadas` : 'Pendiente',
    time: has1 ? (o.entrega1 || '—') : 'Pendiente',
    chip: has1 ? 'info' : '', chipTxt: has1 ? 'Parcial enviado' : ''
  });

  // 4. Segunda entrega
  const has2 = env2 > 0;
  const need2 = items.some(i => i.cantidad > i.env1);
  if (has2 || need2) {
    stages.push({
      dot: has2 ? 'dot-done' : 'dot-pend',
      title: '2da entrega / despacho',
      desc: has2 ? `${env2.toLocaleString()} unidades despachadas` : 'Pendiente — esperando stock o fabricación',
      time: has2 ? '—' : 'Pendiente',
      chip: has2 ? 'ok' : '', chipTxt: 'Completado'
    });
  }

  // 5. Entrega final
  const isDone = o.estado === 'ENTREGADO';
  stages.push({
    dot: isDone ? 'dot-done' : 'dot-pend',
    title: 'Entrega final confirmada',
    desc: isDone ? 'Orden completada' : `Fecha comprometida: ${o.fechaEntrega || '—'}`,
    time: isDone ? o.fechaEntrega : 'Pendiente',
    chip: isDone ? 'ok' : '', chipTxt: 'Entregado'
  });

  return stages.map((s, i) => {
    const isLast = i === stages.length - 1;
    const chipHtml = s.chip ? `<span class="tl-chip chip-${s.chip}">${s.chipTxt}</span>` : '';
    const activeStyle = s.dot === 'dot-pend' ? 'color:var(--text3)' : '';
    return `<div class="tl-row">
      <div class="tl-left">
        <div class="tl-dot ${s.dot}"></div>
        ${!isLast ? '<div class="tl-line"></div>' : ''}
      </div>
      <div class="tl-body">
        <div class="tl-stage" style="${activeStyle}">${s.title}</div>
        <div class="tl-desc" style="${activeStyle}">${s.desc}</div>
        <div class="tl-time">${s.time}</div>
        ${chipHtml}
      </div>
    </div>`;
  }).join('');
}

// ─── HELPERS ──────────────────────────────────────────────
function stLabel(st) {
  return { 'PENDIENTE':'Pendiente','PARCIAL ENVIADO':'Parcial enviado','ENTREGADO':'Entregado','CANCELADO':'Cancelado' }[st] || st;
}
function stClass(st) {
  return { 'PENDIENTE':'b-pend','PARCIAL ENVIADO':'b-part','ENTREGADO':'b-done','CANCELADO':'b-cancel' }[st] || 'b-pend';
}
function itemStClass(st) {
  return { 'PENDIENTE':'b-pend','PARCIAL':'b-part','COMPLETADO':'b-done','SIN STOCK':'b-tick' }[st] || 'b-pend';
}

function pedirAnularOrden(num) {
  const o = ordenes.find(x => x.numero === num);
  if (!o) return;
  // Double confirmation
  const conf1 = confirm(`¿Seguro que quieres anular la orden ${num} de ${o.cliente}?\n\nEsta acción marcará la orden como CANCELADO.`);
  if (!conf1) return;
  const conf2 = confirm(`Confirmación final: ¿Anular definitivamente la orden ${num}?`);
  if (!conf2) return;
  anularOrden(num);
}

async function anularOrden(num) {
  showToast('Anulando orden...', 'loading');
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ accion: 'actualizarEstadoOrden', numero: num, estado: 'CANCELADO' })
    });
    showToast(`✓ Orden ${num} anulada`, 'success');
    // Update local state
    const o = ordenes.find(x => x.numero === num);
    if (o) o.estado = 'CANCELADO';
    setTimeout(() => { filtrar(); seleccionarOrden(num); }, 800);
  } catch(e) {
    showToast('Error al anular', 'error');
  }
}

function imprimirSeguimiento(num) {
  const o = ordenes.find(x => x.numero === num);
  if (!o) return;
  const items = itemsPorOrden[num] || [];
  const totalCant = items.reduce((s,i) => s + i.cantidad, 0);
  const totalEnv1 = items.reduce((s,i) => s + i.env1, 0);
  const totalEnv2 = items.reduce((s,i) => s + i.env2, 0);
  const totalEnv  = totalEnv1 + totalEnv2;
  const totalPend = totalCant - totalEnv;
  const pct       = totalCant > 0 ? Math.round(totalEnv / totalCant * 100) : 0;
  const hoy       = new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'});

  const win = window.open('','_blank');

  htmlParts.push('.header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #111;padding-bottom:12px;margin-bottom:14px}');
  htmlParts.push('.empresa{font-size:18px;font-weight:700}');
  htmlParts.push('.empresa-sub{font-size:11px;color:#555;margin-top:3px}');
  htmlParts.push('.ord-num{font-size:20px;font-weight:700;font-family:monospace}');
  htmlParts.push('.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}');
  htmlParts.push('.b-pend{background:#FFF3CD;color:#856404}.b-part{background:#CCE5FF;color:#004085}.b-done{background:#D4EDDA;color:#155724}');
  htmlParts.push('.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;padding:10px;background:#f7f7f7;border-radius:4px}');
  htmlParts.push('.field .lbl{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.3px}');
  htmlParts.push('.field .val{font-weight:600;margin-top:2px;font-size:13px}');
  htmlParts.push('.prog-section{margin-bottom:14px;padding:10px;background:#f7f7f7;border-radius:4px}');
  htmlParts.push('.prog-label{display:flex;justify-content:space-between;font-size:11px;color:#555;margin-bottom:5px}');
  htmlParts.push('.prog-bar{background:#ddd;border-radius:4px;height:10px;overflow:hidden}');
  htmlParts.push('.prog-fill{height:100%;border-radius:4px}');
  htmlParts.push('.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}');
  htmlParts.push('.stat{text-align:center;padding:8px;background:#f7f7f7;border-radius:4px}');
  htmlParts.push('.stat .v{font-size:20px;font-weight:700;font-family:monospace}');
  htmlParts.push('.stat .l{font-size:10px;color:#666;text-transform:uppercase;margin-top:2px}');
  htmlParts.push('table{width:100%;border-collapse:collapse;margin-bottom:16px}');
  htmlParts.push('th{background:#111;color:#fff;padding:7px 10px;text-align:left;font-size:11px}');
  htmlParts.push('th.r{text-align:right}td{padding:7px 10px;border-bottom:1px solid #ddd;font-size:12px}');
  htmlParts.push('td.r{text-align:right;font-family:monospace}td.code{font-family:monospace;font-size:11px;color:#444}');
  htmlParts.push('tr:nth-child(even) td{background:#f9f9f9}');
  htmlParts.push('.tfoot-row td{background:#f0f0f0;font-weight:700;border-top:2px solid #111}');
  htmlParts.push('.footer{margin-top:20px;padding-top:12px;border-top:1px solid #ccc;font-size:10px;color:#888;text-align:center}');
  htmlParts.push('@media print{body{padding:10px}}');
  htmlParts.push('</style></head><body>');

  // Header
  const badgeClass = o.estado === 'ENTREGADO' ? 'b-done' : o.estado === 'PARCIAL ENVIADO' ? 'b-part' : 'b-pend';
  htmlParts.push('<div class="header"><div><div class="empresa">' + o.empresa + '</div><div class="empresa-sub">Reporte de seguimiento de orden — Documento interno</div></div>');
  htmlParts.push('<div style="text-align:right"><div class="ord-num">' + o.numero + '</div><div style="margin-top:6px"><span class="badge ' + badgeClass + '">' + o.estado + '</span></div></div></div>');

  // Info grid
  htmlParts.push('<div class="info-grid">');
  htmlParts.push('<div class="field"><div class="lbl">Cliente</div><div class="val">' + o.cliente + (o.destinatario ? ' → ' + o.destinatario : '') + '</div></div>');
  htmlParts.push('<div class="field"><div class="lbl">Fecha de orden</div><div class="val">' + (o.fechaOrden||'—') + '</div></div>');
  htmlParts.push('<div class="field"><div class="lbl">Fecha de entrega</div><div class="val">' + (o.fechaEntrega||'—') + '</div></div>');

  // Items table
  htmlParts.push('<table><thead><tr><th>#</th><th>Código</th><th>Descripción</th><th class="r">Pedido</th><th class="r">1ra Entrega</th><th class="r">2da Entrega</th><th class="r">Pendiente</th><th class="r">Avance</th><th>Estado</th></tr></thead><tbody>');
  items.forEach(function(item, i) {

  // Footer
  htmlParts.push('<div class="footer">GestiOrder — ' + o.empresa + ' · Generado el ' + hoy + ' · Documento de uso interno</div>');

  htmlParts.push('</body></html>');

  win.document.write(htmlParts.join(''));

}

let toastTimer;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  if (type !== 'loading') toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
