<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GestiOrder — Operario</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F4F6FB;--surface:#FFFFFF;--surface2:#EEF1F8;--surface3:#E2E7F2;
  --border:#D0D7E8;--border2:#B8C3DC;
  --accent:#0036B3;--accent2:#0044DD;--accent-dim:rgba(0,54,179,0.08);
  --green:#3DA800;--green2:#5DCD00;--green-dim:rgba(93,205,0,0.12);--green-text:#2A7500;
  --yellow:#E08A00;--yellow-dim:rgba(224,138,0,0.10);
  --red:#D0310A;--red-dim:rgba(208,49,10,0.10);
  --blue-light:#E8EEFA;
  --text:#1A1F36;--text2:#575756;--text3:#8A92A8;
  --font:'Poppins',sans-serif;--mono:'DM Mono',monospace;
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 4px rgba(0,36,120,0.08),0 0 0 1px rgba(0,36,120,0.04);
  --shadow-md:0 4px 16px rgba(0,36,120,0.12),0 0 0 1px rgba(0,36,120,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 15px; min-height: 100vh; }

/* HEADER */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.header-left .title { font-size: 17px; font-weight: 600; }
.header-left .sub { font-size: 12px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
.refresh-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; color: var(--text2); font-size: 13px; font-family: var(--font); cursor: pointer; display: flex; align-items: center; gap: 6px; }
.refresh-btn:active { background: var(--surface3); }

/* SELECTOR OPERARIO */
.op-selector { padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
.op-label { font-size: 12px; color: var(--text3); margin-bottom: 8px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .5px; }
.op-pills { display: flex; gap: 8px; flex-wrap: wrap; }
.op-pill { padding: 10px 18px; border-radius: 30px; border: 1.5px solid var(--border2); background: var(--surface2); font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; color: var(--text2); }
.op-pill:active { transform: scale(.97); }
.op-pill.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); }

/* CONTENT */
.content { padding: 16px 20px; }
.section-title { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: .6px; font-family: var(--mono); margin-bottom: 12px; }

/* TICKET CARD — tablet optimized */
.ticket-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; transition: border-color .15s; }
.ticket-card.urgent { border-left: 4px solid var(--red); }
.ticket-card.normal { border-left: 4px solid var(--yellow); }
.ticket-card.proc   { border-left: 4px solid var(--accent); }
.tc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.tc-num { font-family: var(--mono); font-size: 12px; color: var(--text3); }
.tc-product { font-size: 16px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
.tc-desc { font-size: 13px; color: var(--text2); margin-bottom: 12px; }
.tc-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.tc-meta-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }
.tc-meta-item .mlabel { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; font-family: var(--mono); margin-bottom: 4px; }
.tc-meta-item .mval { font-size: 14px; font-weight: 500; }
.urgency-bar { padding: 8px 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; margin-bottom: 14px; font-family: var(--mono); }
.urg-red { background: var(--red-dim); color: var(--red); }
.urg-yellow { background: var(--yellow-dim); color: var(--yellow); }
.urg-normal { background: var(--surface2); color: var(--text2); }

/* ACTION BUTTONS — big for tablet */
.action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.action-btn { padding: 14px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 600; font-family: var(--font); cursor: pointer; transition: all .15s; text-align: center; }
.action-btn:active { transform: scale(.97); }
.btn-proceso { background: var(--accent-dim); color: var(--accent2); border: 1.5px solid var(--accent); }
.btn-completado { background: var(--green-dim); color: var(--green); border: 1.5px solid var(--green); }
.btn-completado-full { grid-column: 1/-1; background: var(--green); color: #fff; }

/* BADGE */
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; font-family: var(--mono); }
.b-pend { background: var(--yellow-dim); color: var(--yellow); }
.b-proc { background: var(--accent-dim); color: var(--accent2); }
.b-done { background: var(--green-dim); color: var(--green); }

/* EMPTY */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: var(--text3); text-align: center; }
.empty-icon { font-size: 48px; }

/* CONFIRM MODAL */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 100; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .2s; }
.modal-bg.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 24px 20px 36px; width: 100%; border-top: 1px solid var(--border2); }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
.modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-btn { padding: 16px; border-radius: var(--radius-sm); border: none; font-size: 15px; font-weight: 600; font-family: var(--font); cursor: pointer; }
.modal-btn:active { transform: scale(.97); }
.modal-cancel { background: var(--surface2); color: var(--text2); }
.modal-confirm { background: var(--green); color: #fff; }

/* TOAST */
.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px 20px; font-size: 14px; z-index: 200; opacity: 0; transition: all .3s; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--red); }
.toast.loading { border-left: 3px solid var(--accent); }

.spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent2); border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="title">GestiOrder</div>
    <div class="sub">Vista operario</div>
  </div>
  <a href="tickets.html" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text2);font-size:13px;font-family:var(--font);text-decoration:none;display:inline-flex;align-items:center;gap:6px">← Admin</a>
  <button class="refresh-btn" onclick="cargarTickets()">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1,4 1,1 4,1"/><path d="M1,1 A7,7,0,1,1,3,12"/></svg>
    Actualizar
  </button>
</div>

<div class="op-selector">
  <div class="op-label">¿Quién eres?</div>
  <div class="op-pills">
    <div class="op-pill" onclick="seleccionarOperario('Operario 1',this)">Operario 1</div>
    <div class="op-pill" onclick="seleccionarOperario('Operario 2',this)">Operario 2</div>
    <div class="op-pill" onclick="seleccionarOperario('Operario 3',this)">Operario 3</div>
    <div class="op-pill" onclick="seleccionarOperario('Operario 4',this)">Operario 4</div>
  </div>
</div>

<div class="content" id="mainContent">
  <div class="empty">
    <div class="empty-icon">👆</div>
    <div style="font-size:15px;font-weight:500">Selecciona tu número de operario</div>
    <div style="font-size:13px">para ver tus tickets pendientes</div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Marcar como completado</div>
    <div class="modal-sub" id="modalSub">¿Confirmas que terminaste este producto?</div>
    <div class="modal-btns">
      <button class="modal-btn modal-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="modal-btn modal-confirm" onclick="confirmarAccion()" id="btnConfirm">Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEET_ID   = '1lc-HSFfaUKF0c7qVQVoqshhzcnlEsjzX9HTPo4EFSNs';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9NRV2FcnD2i3y1xrPx84eiCie23HZjVqoRN01fydfkjM_pgZmxRAqqN73m7aNkVCphw/exec';

let operarioActual = '';
let tickets = [];
let pendingAction = null;

function seleccionarOperario(nombre, el) {
  document.querySelectorAll('.op-pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
  operarioActual = nombre;
  cargarTickets();
}

async function cargarTickets() {
  if (!operarioActual) return;
  const content = document.getElementById('mainContent');
  content.innerHTML = '<div class="empty"><div class="spinner"></div><div>Cargando tickets...</div></div>';
  showToast('Actualizando...', 'loading');

  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=TICKETS_FAB&range=A4:G500`;
    const raw = await fetch(url).then(r => r.text());
    const todos = parseGviz(raw).filter(r => r[0]);

    tickets = todos
      .map(r => ({
        numero:    r[0]?.trim(),
        codigo:    r[1]?.trim(),
        descripcion: r[2]?.trim(),
        orden:     r[3]?.trim(),
        operario:  r[4]?.trim(),
        fechaLim:  r[5]?.trim(),
        estado:    r[6]?.trim() || 'PENDIENTE',
      }))
      .filter(t => t.operario === operarioActual && t.estado !== 'COMPLETADO');

    renderTickets();
    showToast(tickets.length > 0 ? `${tickets.length} ticket${tickets.length>1?'s':''} pendiente${tickets.length>1?'s':''}` : 'Sin tickets pendientes', 'success');
  } catch(e) {
    content.innerHTML = '<div class="empty"><div style="color:var(--red)">Error al cargar</div><div style="font-size:13px">Intenta actualizar</div></div>';
    showToast('Error al cargar', 'error');
  }
}

function parseGviz(raw) {
  try {
    const json = JSON.parse(raw.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    return (json.table.rows || []).map(row =>
      (json.table.cols || []).map((col, i) => {
        const cell = row.c[i];
        if (!cell || cell.v === null) return '';
        if (col.type === 'date' || col.type === 'datetime') {
          const m = String(cell.v).match(/Date\((\d+),(\d+),(\d+)/);
          if (m) {
            const d = new Date(+m[1], +m[2], +m[3]);
            return d.toLocaleDateString('es-PE', {day:'2-digit',month:'2-digit',year:'numeric'});
          }
        }
        return String(cell.v);
      })
    );
  } catch(e) { return []; }
}

function renderTickets() {
  const content = document.getElementById('mainContent');
  if (!tickets.length) {
    content.innerHTML = `
      <div class="empty">
        <div class="empty-icon">✅</div>
        <div style="font-size:16px;font-weight:600">Todo al día</div>
        <div style="font-size:13px">${operarioActual} no tiene tickets pendientes</div>
      </div>`;
    return;
  }

  // Separar pendientes y en proceso
  const pendientes = tickets.filter(t => t.estado === 'PENDIENTE');
  const enProceso  = tickets.filter(t => t.estado === 'EN PROCESO');

  let html = '';
  if (enProceso.length) {
    html += `<div class="section-title">En proceso (${enProceso.length})</div>`;
    html += enProceso.map(t => ticketHtml(t)).join('');
  }
  if (pendientes.length) {
    html += `<div class="section-title" style="margin-top:${enProceso.length?'20px':'0'}">Pendientes (${pendientes.length})</div>`;
    html += pendientes.map(t => ticketHtml(t)).join('');
  }

  content.innerHTML = html;
}

function ticketHtml(t) {
  const urgencia = calcUrgencia(t.fechaLim);
  const cardClass = t.estado === 'EN PROCESO' ? 'proc' : urgencia.dias <= 1 ? 'urgent' : 'normal';
  const urgClass  = urgencia.dias <= 1 ? 'urg-red' : urgencia.dias <= 3 ? 'urg-yellow' : 'urg-normal';
  const badgeClass = t.estado === 'EN PROCESO' ? 'b-proc' : 'b-pend';

  const btns = t.estado === 'EN PROCESO'
    ? `<div class="action-btns">
        <button class="action-btn btn-completado btn-completado-full" onclick="pedirConfirmacion('${t.numero}','completado')">✓ Marcar como completado</button>
       </div>`
    : `<div class="action-btns">
        <button class="action-btn btn-proceso" onclick="pedirConfirmacion('${t.numero}','proceso')">▶ Iniciar</button>
        <button class="action-btn btn-completado" onclick="pedirConfirmacion('${t.numero}','completado')">✓ Completado</button>
       </div>`;

  return `
  <div class="ticket-card ${cardClass}" id="card-${t.numero}">
    <div class="tc-top">
      <span class="tc-num">${t.numero}</span>
      <span class="badge ${badgeClass}">${t.estado}</span>
    </div>
    <div class="tc-product">${t.codigo}</div>
    ${t.descripcion ? `<div class="tc-desc">${t.descripcion}</div>` : ''}
    <div class="tc-meta">
      <div class="tc-meta-item">
        <div class="mlabel">Orden</div>
        <div class="mval" style="color:var(--accent2)">${t.orden}</div>
      </div>
      <div class="tc-meta-item">
        <div class="mlabel">Fecha límite</div>
        <div class="mval">${t.fechaLim || '—'}</div>
      </div>
    </div>
    <div class="urgency-bar ${urgClass}">${urgencia.texto}</div>
    ${btns}
  </div>`;
}

function calcUrgencia(fechaStr) {
  if (!fechaStr) return { dias: 99, texto: 'Sin fecha límite', color: 'var(--text3)' };
  const parts = fechaStr.split('/');
  if (parts.length < 3) return { dias: 99, texto: fechaStr, color: 'var(--text3)' };
  const fecha = new Date(parts[2], parts[1]-1, parts[0]);
  const hoy   = new Date(); hoy.setHours(0,0,0,0);
  const dias  = Math.ceil((fecha - hoy) / 86400000);
  if (dias < 0)  return { dias, texto: `⚠ Vencido hace ${Math.abs(dias)} día${Math.abs(dias)>1?'s':''}`, color: 'var(--red)' };
  if (dias === 0) return { dias, texto: '🔴 Vence HOY', color: 'var(--red)' };
  if (dias === 1) return { dias, texto: '🟡 Vence mañana', color: 'var(--yellow)' };
  return { dias, texto: `Vence en ${dias} días`, color: 'var(--text2)' };
}

// ─── CONFIRMACIÓN ─────────────────────────────────────────
function pedirConfirmacion(num, accion) {
  pendingAction = { num, accion };
  const t = tickets.find(t => t.numero === num);
  const modal = document.getElementById('modalBg');
  document.getElementById('modalTitle').textContent = accion === 'completado' ? 'Marcar como completado' : 'Iniciar fabricación';
  document.getElementById('modalSub').textContent = accion === 'completado'
    ? `¿Confirmas que terminaste ${t?.codigo}?`
    : `¿Inicias la fabricación de ${t?.codigo}?`;
  modal.classList.add('open');
}

function cerrarModal() {
  document.getElementById('modalBg').classList.remove('open');
  pendingAction = null;
}

async function confirmarAccion() {
  if (!pendingAction) return;
  const { num, accion } = pendingAction;
  const nuevoEstado = accion === 'completado' ? 'COMPLETADO' : 'EN PROCESO';

  const btn = document.getElementById('btnConfirm');
  btn.textContent = '...';
  btn.disabled = true;
  showToast('Actualizando...', 'loading');

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ accion: 'actualizarTicket', numero: num, estado: nuevoEstado })
    });
    cerrarModal();
    showToast(nuevoEstado === 'COMPLETADO' ? '✓ Completado' : '▶ En proceso', 'success');
    setTimeout(() => cargarTickets(), 800);
  } catch(e) {
    showToast('Error al actualizar', 'error');
  } finally {
    btn.textContent = 'Confirmar';
    btn.disabled = false;
  }
}

let toastTimer;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  if (type !== 'loading') toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
